<!-- @dsCard group="Components" viewport="700x300" name="Buttons & Forms" subtitle="Buttons, inputs, select & switch" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Theme: anti-flash init -->
<script>(function(){var t=localStorage.getItem('gorda-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;})()</script>
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display: flex; flex-wrap: wrap; gap: 12px; align-items: center; margin-bottom: 18px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; align-items: end; }
</style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { Button, Input, Select, Switch } = window.GordaDesignSystem_019e24;
    function Demo() {
      const [on, setOn] = React.useState(true);
      return (
        <div>
          <div className="row">
            <Button color="primary">Primary</Button>
            <Button color="info" icon="fas fa-plus">New service</Button>
            <Button color="success" variant="solid">Solid</Button>
            <Button color="dark" variant="outline">Outline</Button>
            <Button color="danger" rounded icon="fas fa-ban">Cancel</Button>
            <Button color="primary" size="sm">Small</Button>
            <Button color="secondary" disabled>Disabled</Button>
          </div>
          <div className="grid">
            <Input label="Email Address" type="email" placeholder="Enter email" icon="fas fa-envelope" />
            <Select label="Branch" options={['Bogotá','Medellín','Cali']} />
            <div style={{display:'flex',flexDirection:'column',gap:'10px',paddingBottom:'4px'}}>
              <Switch checked={on} onChange={setOn} label="WhatsApp ChatBot" />
              <Switch checked={!on} onChange={()=>setOn(!on)} label="Assistant" />
            </div>
          </div>
        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<Demo/>);
  </script>

<!-- Theme toggle button -->
<button id="__tt" title="Toggle theme" style="position:fixed;top:10px;right:10px;z-index:9999;width:28px;height:28px;border-radius:6px;border:1px solid var(--border-color);background:var(--surface-card);cursor:pointer;font-size:14px;line-height:1;padding:0;box-shadow:0 2px 9px -5px rgba(0,0,0,0.3);color:var(--text-heading);"></button>
<script>(function(){var b=document.getElementById('__tt');function apply(t){document.documentElement.dataset.theme=t;b.textContent=t==='dark'?'☀':'☽';}apply(document.documentElement.dataset.theme||'light');b.addEventListener('click',function(){var n=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('gorda-theme',n);apply(n);});window.addEventListener('storage',function(e){if(e.key==='gorda-theme')apply(e.newValue);});})()</script>
</body>
</html>
