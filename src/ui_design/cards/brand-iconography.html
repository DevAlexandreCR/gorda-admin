<!-- @dsCard group="Brand" viewport="700x180" name="Iconography" subtitle="Font Awesome 6 solid/brands · white icon-chip pattern" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Theme: anti-flash init -->
<script>(function(){var t=localStorage.getItem('gorda-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;})()</script>
<link rel="stylesheet" href="../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); font-family: var(--font-sans); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; align-items: center; }
  .chip { width: 44px; height: 44px; border-radius: var(--radius-md); background: #fff; box-shadow: 0 2px 9px -5px rgba(0,0,0,0.4), 0 0 1px rgba(0,0,0,0.1); display: flex; align-items: center; justify-content: center; color: var(--primary); font-size: 1rem; }
  .grad { background: var(--gradient-primary); color: #fff; }
  .lbl { font-size: 0.62rem; color: var(--text-muted); margin-top: 18px; font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <span class="chip grad"><em class="fas fa-route"></em></span>
    <span class="chip"><em class="fa-solid fa-car-side"></em></span>
    <span class="chip"><em class="fa-solid fa-car"></em></span>
    <span class="chip"><em class="fas fa-location-dot"></em></span>
    <span class="chip" style="color:var(--whatsapp-green)"><em class="fa-brands fa-whatsapp"></em></span>
    <span class="chip"><em class="fa-solid fa-chart-pie"></em></span>
    <span class="chip"><em class="fa-solid fa-screwdriver-wrench"></em></span>
    <span class="chip"><em class="fas fa-users"></em></span>
    <span class="chip"><em class="fas fa-paper-plane"></em></span>
    <span class="chip"><em class="fas fa-pencil"></em></span>
    <span class="chip"><em class="fas fa-plus"></em></span>
    <span class="chip" style="color:var(--danger)"><em class="fas fa-sign-out-alt"></em></span>
  </div>
  <div class="lbl">Font Awesome 6 · solid + brands · rendered in white rounded chips with a soft shadow</div>

<!-- Theme toggle button -->
<button id="__tt" title="Toggle theme" style="position:fixed;top:10px;right:10px;z-index:9999;width:28px;height:28px;border-radius:6px;border:1px solid var(--border-color);background:var(--surface-card);cursor:pointer;font-size:14px;line-height:1;padding:0;box-shadow:0 2px 9px -5px rgba(0,0,0,0.3);color:var(--text-heading);"></button>
<script>(function(){var b=document.getElementById('__tt');function apply(t){document.documentElement.dataset.theme=t;b.textContent=t==='dark'?'☀':'☽';}apply(document.documentElement.dataset.theme||'light');b.addEventListener('click',function(){var n=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('gorda-theme',n);apply(n);});window.addEventListener('storage',function(e){if(e.key==='gorda-theme')apply(e.newValue);});})()</script>
</body>
</html>
