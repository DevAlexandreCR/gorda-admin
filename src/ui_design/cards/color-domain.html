<!-- @dsCard group="Colors" viewport="700x150" name="Domain accents" subtitle="WhatsApp green, driver amber & service status colors" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Theme: anti-flash init -->
<script>(function(){var t=localStorage.getItem('gorda-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;})()</script>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); font-family: var(--font-sans); }
  .group { display: flex; gap: 22px; }
  .col { flex: 1; }
  .lbl { font-size: 0.62rem; text-transform: uppercase; letter-spacing: .04rem; color: var(--text-muted); font-weight: 700; margin-bottom: 8px; }
  .row { display: flex; gap: 8px; }
  .sw { flex: 1; text-align: center; }
  .chip { height: 48px; border-radius: var(--radius-md); box-shadow: var(--shadow-xs); }
  .name { font-size: 0.62rem; color: var(--text-muted); margin-top: 5px; }
</style>
</head>
<body>
  <div class="group">
    <div class="col">
      <div class="lbl">Channels</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:var(--whatsapp-green)"></div><div class="name">WA green</div></div>
        <div class="sw"><div class="chip" style="background:var(--whatsapp-header)"></div><div class="name">WA header</div></div>
        <div class="sw"><div class="chip" style="background:var(--driver-amber)"></div><div class="name">Driver</div></div>
      </div>
    </div>
    <div class="col">
      <div class="lbl">Service status</div>
      <div class="row">
        <div class="sw"><div class="chip" style="background:var(--status-pending)"></div><div class="name">Pending</div></div>
        <div class="sw"><div class="chip" style="background:var(--status-in-progress)"></div><div class="name">In progress</div></div>
        <div class="sw"><div class="chip" style="background:var(--status-completed)"></div><div class="name">Completed</div></div>
        <div class="sw"><div class="chip" style="background:var(--status-canceled)"></div><div class="name">Canceled</div></div>
      </div>
    </div>
  </div>

<!-- Theme toggle button -->
<button id="__tt" title="Toggle theme" style="position:fixed;top:10px;right:10px;z-index:9999;width:28px;height:28px;border-radius:6px;border:1px solid var(--border-color);background:var(--surface-card);cursor:pointer;font-size:14px;line-height:1;padding:0;box-shadow:0 2px 9px -5px rgba(0,0,0,0.3);color:var(--text-heading);"></button>
<script>(function(){var b=document.getElementById('__tt');function apply(t){document.documentElement.dataset.theme=t;b.textContent=t==='dark'?'☀':'☽';}apply(document.documentElement.dataset.theme||'light');b.addEventListener('click',function(){var n=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('gorda-theme',n);apply(n);});window.addEventListener('storage',function(e){if(e.key==='gorda-theme')apply(e.newValue);});})()</script>
</body>
</html>
