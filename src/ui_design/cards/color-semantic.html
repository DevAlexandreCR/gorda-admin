<!-- @dsCard group="Colors" viewport="700x150" name="Semantic" subtitle="Status & intent colors — info, success, warning, danger, secondary" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Theme: anti-flash init -->
<script>(function(){var t=localStorage.getItem('gorda-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;})()</script>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--surface-card); }
  .row { display: flex; gap: 12px; }
  .sw { flex: 1; text-align: center; }
  .chip { height: 64px; border-radius: var(--radius-md); box-shadow: var(--shadow-xs); }
  .name { font-size: var(--fs-xs); font-weight: 700; color: var(--text-heading); margin-top: 8px; }
  .hex { font-size: 0.7rem; color: var(--text-muted); font-family: var(--font-mono); }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--info)"></div><div class="name">Info</div><div class="hex">#17c1e8</div></div>
    <div class="sw"><div class="chip" style="background:var(--success)"></div><div class="name">Success</div><div class="hex">#82d616</div></div>
    <div class="sw"><div class="chip" style="background:var(--warning)"></div><div class="name">Warning</div><div class="hex">#fbcf33</div></div>
    <div class="sw"><div class="chip" style="background:var(--danger)"></div><div class="name">Danger</div><div class="hex">#ea0606</div></div>
    <div class="sw"><div class="chip" style="background:var(--secondary)"></div><div class="name">Secondary</div><div class="hex">#8392ab</div></div>
  </div>

<!-- Theme toggle button -->
<button id="__tt" title="Toggle theme" style="position:fixed;top:10px;right:10px;z-index:9999;width:28px;height:28px;border-radius:6px;border:1px solid var(--border-color);background:var(--surface-card);cursor:pointer;font-size:14px;line-height:1;padding:0;box-shadow:0 2px 9px -5px rgba(0,0,0,0.3);color:var(--text-heading);"></button>
<script>(function(){var b=document.getElementById('__tt');function apply(t){document.documentElement.dataset.theme=t;b.textContent=t==='dark'?'☀':'☽';}apply(document.documentElement.dataset.theme||'light');b.addEventListener('click',function(){var n=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('gorda-theme',n);apply(n);});window.addEventListener('storage',function(e){if(e.key==='gorda-theme')apply(e.newValue);});})()</script>
</body>
</html>
