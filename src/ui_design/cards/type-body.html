<!-- @dsCard group="Type" viewport="700x280" name="Body & utility text" subtitle="Body, lead, small, captions & table-head eyebrow" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Theme: anti-flash init -->
<script>(function(){var t=localStorage.getItem('gorda-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;})()</script>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .item { padding: 7px 0; border-bottom: 1px solid var(--gray-100); }
  .item:last-child { border-bottom: 0; }
  .tag { font-size: 0.62rem; font-family: var(--font-mono); color: var(--text-muted); display: block; margin-bottom: 2px; }
</style>
</head>
<body>
  <div class="item"><span class="tag">lead · 20px / 300</span><span style="font-size:var(--fs-lead); font-weight:var(--fw-light); color:var(--text-heading)">Manage every ride from one panel.</span></div>
  <div class="item"><span class="tag">body · 16px / 400</span><span style="color:var(--text-body)">The client requests a ride over WhatsApp and the bot creates the service automatically.</span></div>
  <div class="item"><span class="tag">small · 14px</span><span style="font-size:var(--fs-sm); color:var(--text-body)">Showing 1–20 of 248 services</span></div>
  <div class="item"><span class="tag">caption · 12px / muted</span><span style="font-size:var(--fs-xs); color:var(--text-muted)">Last connection 4 min ago</span></div>
  <div class="item"><span class="tag">table head · 10px / 700 / uppercase</span><span style="font-size:var(--fs-xxs); font-weight:700; text-transform:uppercase; letter-spacing:0.02rem; color:var(--text-secondary)">Start address</span></div>

<!-- Theme toggle button -->
<button id="__tt" title="Toggle theme" style="position:fixed;top:10px;right:10px;z-index:9999;width:28px;height:28px;border-radius:6px;border:1px solid var(--border-color);background:var(--surface-card);cursor:pointer;font-size:14px;line-height:1;padding:0;box-shadow:0 2px 9px -5px rgba(0,0,0,0.3);color:var(--text-heading);"></button>
<script>(function(){var b=document.getElementById('__tt');function apply(t){document.documentElement.dataset.theme=t;b.textContent=t==='dark'?'☀':'☽';}apply(document.documentElement.dataset.theme||'light');b.addEventListener('click',function(){var n=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('gorda-theme',n);apply(n);});window.addEventListener('storage',function(e){if(e.key==='gorda-theme')apply(e.newValue);});})()</script>
</body>
</html>
