<!-- @dsCard group="Spacing" viewport="700x160" name="Spacing scale" subtitle="Bootstrap spacers · 4 / 8 / 16 / 24 / 48 / 64 px" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!-- Theme: anti-flash init -->
<script>(function(){var t=localStorage.getItem('gorda-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.dataset.theme=t;})()</script>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 24px; background: var(--surface-card); }
  .row { display: flex; gap: 18px; align-items: flex-end; }
  .item { text-align: center; }
  .bar { background: var(--gradient-primary); border-radius: var(--radius-xs); width: 100%; }
  .box { width: 56px; }
  .lbl { font-size: 0.62rem; font-family: var(--font-mono); color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
  <div class="row">
    <div class="item box"><div class="bar" style="height:var(--space-1)"></div><div class="lbl">1 · 4</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-2)"></div><div class="lbl">2 · 8</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-3)"></div><div class="lbl">3 · 16</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-4)"></div><div class="lbl">4 · 24</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-5)"></div><div class="lbl">5 · 48</div></div>
    <div class="item box"><div class="bar" style="height:var(--space-6)"></div><div class="lbl">6 · 64</div></div>
  </div>

<!-- Theme toggle button -->
<button id="__tt" title="Toggle theme" style="position:fixed;top:10px;right:10px;z-index:9999;width:28px;height:28px;border-radius:6px;border:1px solid var(--border-color);background:var(--surface-card);cursor:pointer;font-size:14px;line-height:1;padding:0;box-shadow:0 2px 9px -5px rgba(0,0,0,0.3);color:var(--text-heading);"></button>
<script>(function(){var b=document.getElementById('__tt');function apply(t){document.documentElement.dataset.theme=t;b.textContent=t==='dark'?'☀':'☽';}apply(document.documentElement.dataset.theme||'light');b.addEventListener('click',function(){var n=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('gorda-theme',n);apply(n);});window.addEventListener('storage',function(e){if(e.key==='gorda-theme')apply(e.newValue);});})()</script>
</body>
</html>
