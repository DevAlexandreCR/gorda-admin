<!-- @dsCard group="Colors" viewport="700x220" name="Dark theme" subtitle="Surface, text & border tokens for [data-theme=dark]" -->
<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<!-- Theme: anti-flash init -->
<script>document.documentElement.dataset.theme='dark';</script>
<link rel="stylesheet" href="../styles.css">
<style>
  body { margin: 0; padding: 20px; background: var(--body-bg); }
  .grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { text-align: center; }
  .chip {
    height: 64px; border-radius: var(--radius-md);
    border: 1px solid var(--border-subtle);
    box-shadow: var(--shadow-xs);
  }
  .name { font-size: var(--fs-xs); font-weight: 700; color: var(--text-heading); margin-top: 8px; }
  .hex  { font-size: 0.68rem; color: var(--text-muted); font-family: var(--font-mono); margin-top: 2px; }
  .divider { grid-column: 1/-1; border: none; border-top: 1px solid var(--border-subtle); margin: 2px 0; }
  .row-label {
    grid-column: 1/-1;
    font-size: 0.65rem; font-weight: 700; text-transform: uppercase;
    letter-spacing: 0.06em; color: var(--text-muted);
    margin-bottom: -4px;
  }
</style>
</head>
<body>
  <div class="grid">
    <div class="row-label">Surfaces</div>
    <div class="sw"><div class="chip" style="background:#1a1f2e"></div><div class="name">body-bg</div><div class="hex">#1a1f2e</div></div>
    <div class="sw"><div class="chip" style="background:#252d3d"></div><div class="name">surface-card</div><div class="hex">#252d3d</div></div>
    <div class="sw"><div class="chip" style="background:#1e2536"></div><div class="name">surface-input</div><div class="hex">#1e2536</div></div>
    <div class="sw"><div class="chip" style="background:#344767"></div><div class="name">border-color</div><div class="hex">#344767</div></div>
    <div class="sw"><div class="chip" style="background:#2d3655"></div><div class="name">border-subtle</div><div class="hex">#2d3655</div></div>
    <hr class="divider">
    <div class="row-label">Text</div>
    <div class="sw"><div class="chip" style="background:#ffffff"></div><div class="name">text-heading</div><div class="hex">#ffffff</div></div>
    <div class="sw"><div class="chip" style="background:#a8b8d8"></div><div class="name">text-body</div><div class="hex">#a8b8d8</div></div>
    <div class="sw"><div class="chip" style="background:#7b88a8"></div><div class="name">text-muted</div><div class="hex">#7b88a8</div></div>
    <div class="sw"><div class="chip" style="background:#8392ab"></div><div class="name">text-secondary</div><div class="hex">#8392ab</div></div>
    <div class="sw"><div class="chip" style="background:var(--primary)"></div><div class="name">primary</div><div class="hex">unchanged</div></div>
  </div>

<!-- Theme toggle button -->
<button id="__tt" title="Toggle theme" style="position:fixed;top:10px;right:10px;z-index:9999;width:28px;height:28px;border-radius:6px;border:1px solid var(--border-color);background:var(--surface-card);cursor:pointer;font-size:14px;line-height:1;padding:0;box-shadow:0 2px 9px -5px rgba(0,0,0,0.3);color:var(--text-heading);"></button>
<script>(function(){var b=document.getElementById('__tt');function apply(t){document.documentElement.dataset.theme=t;b.textContent=t==='dark'?'☀':'☽';}apply(document.documentElement.dataset.theme||'light');b.addEventListener('click',function(){var n=document.documentElement.dataset.theme==='dark'?'light':'dark';localStorage.setItem('gorda-theme',n);apply('dark');});window.addEventListener('storage',function(e){if(e.key==='gorda-theme')apply(e.newValue);});})()</script>
</body>
</html>
