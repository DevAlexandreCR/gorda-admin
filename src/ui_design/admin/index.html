<!-- @startingPoint section="Admin" subtitle="Full Gorda admin dashboard shell" viewport="1280x800" -->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gorda Admin</title>

<!-- Anti-flash: set theme before paint -->
<script>
  (function() {
    var saved = localStorage.getItem('gorda-theme');
    if (saved) { document.documentElement.dataset.theme = saved; return; }
    if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
      document.documentElement.dataset.theme = 'dark';
    } else {
      document.documentElement.dataset.theme = 'light';
    }
  })();
</script>

<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script src="../../_ds_bundle.js"></script>
<script src="data.js"></script>
<style>
  html, body { margin: 0; height: 100%; background: var(--body-bg); }
  #app { min-height: 100vh; }
</style>
</head>
<body>
  <div id="app"></div>

  <script type="text/babel" src="Sidebar.jsx"></script>
  <script type="text/babel" src="TopNav.jsx"></script>
  <script type="text/babel" src="DashboardView.jsx"></script>
  <script type="text/babel" src="ServicesView.jsx"></script>
  <script type="text/babel" src="DriversView.jsx"></script>
  <script type="text/babel" src="EditDriverView.jsx"></script>
  <script type="text/babel" src="SettingsView.jsx"></script>
  <script type="text/babel" src="VehiclesView.jsx"></script>
  <script type="text/babel" src="VehicleDetailView.jsx"></script>
  <script type="text/babel" src="WhatsAppView.jsx"></script>
  <script type="text/babel" src="EditMessageModal.jsx"></script>
  <script type="text/babel" src="LoginView.jsx"></script>

  <script type="text/babel" data-presets="react">
    const { useState, useEffect } = React;

    const TITLES = {
      dashboard: 'Dashboard', services: 'Services', drivers: 'Drivers',
      vehicles: 'Vehículos', places: 'Places', whatsapp: 'WhatsApp connection',
      metrics: 'Metrics', settings: 'Settings',
    };

    function Placeholder({ title }) {
      return (
        <div style={{
          background: 'var(--surface-card)', borderRadius: '1rem',
          boxShadow: 'var(--shadow-card)',
          padding: '4rem 2rem', textAlign: 'center', color: 'var(--text-body)',
          fontFamily: "'Open Sans', sans-serif",
        }}>
          <em className="fas fa-screwdriver-wrench" style={{ fontSize: '2rem', color: '#cb0c9f', marginBottom: '1rem', display: 'block' }} />
          <h5 style={{ color: 'var(--text-heading)', margin: '0 0 0.5rem' }}>{title}</h5>
          <p style={{ margin: 0, fontSize: '0.85rem' }}>This screen is part of the live product and not recreated in this kit.</p>
        </div>
      );
    }

    function App() {
      const [authed, setAuthed] = useState(false);
      const [view, setView] = useState('services');
      const [editingDriver, setEditingDriver] = useState(null);
      const [viewingVehicle, setViewingVehicle] = useState(null);

      // Theme state — initialized from what the anti-flash script already set
      const [theme, setTheme] = useState(() => {
        return document.documentElement.dataset.theme || 'light';
      });

      // Sync theme to <html> and localStorage on every change
      useEffect(() => {
        document.documentElement.dataset.theme = theme;
        localStorage.setItem('gorda-theme', theme);
      }, [theme]);

      const toggleTheme = () => setTheme(t => t === 'dark' ? 'light' : 'dark');

      if (!authed) return <LoginView onLogin={() => setAuthed(true)} />;

      const handleNavigate = (v) => { setView(v); setEditingDriver(null); setViewingVehicle(null); };

      let content;
      if (view === 'dashboard') content = <DashboardView />;
      else if (view === 'services') content = <ServicesView />;
      else if (view === 'drivers') {
        if (editingDriver) {
          content = <EditDriverView driver={editingDriver} onBack={() => setEditingDriver(null)} />;
        } else {
          content = <DriversView onEditDriver={(d) => setEditingDriver(d)} />;
        }
      }
      else if (view === 'vehicles') {
        if (viewingVehicle) {
          content = <VehicleDetailView vehicle={viewingVehicle} onBack={() => setViewingVehicle(null)} />;
        } else {
          content = <VehiclesView onViewVehicle={(v) => setViewingVehicle(v)} />;
        }
      }
      else if (view === 'whatsapp') content = <WhatsAppView />;
      else if (view === 'settings') content = <SettingsView />;
      else content = <Placeholder title={TITLES[view]} />;

      const navTitle = editingDriver ? 'Drivers' : viewingVehicle ? 'Vehículos' : (TITLES[view] || view);

      return (
        <div style={{ position: 'relative', minHeight: '100vh' }}>
          <Sidebar active={view} onNavigate={handleNavigate} />
          <main style={{ marginLeft: 272, padding: '1rem 1.5rem 1.5rem' }}>
            <TopNav title={navTitle} theme={theme} onToggleTheme={toggleTheme} />
            {content}
          </main>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('app')).render(<App />);
  </script>
</body>
</html>
